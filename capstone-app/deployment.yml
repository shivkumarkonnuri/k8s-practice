kind: Deployment
apiVersion: apps/v1

metadata:
  name: capstone-app-deployment
  namespace: capstone-app
  labels:
    app: capstone-app-label

spec:
  replicas: 7
  selector:
    matchLabels:
      app: capstone-app-label
  template:
    metadata:
      labels:
        app: capstone-app-label

    spec:
      containers:
        - name: capstone-app
          image: shivkumarkonnuri/capstone-app:latest
          ports:
            - containerPort: 80
