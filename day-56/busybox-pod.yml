apiVersion: v1
kind: Pod
metadata:
  name: busybox-nslookup
  namespace: dev
spec:
  containers:
    - name: busybox
      image: busybox:1.28
      command:
        - sh
        - -c
        - |
          nslookup nginx-deployment-0.nginx-headless.dev.svc.cluster.local
          nslookup nginx-deployment-1.nginx-headless.dev.svc.cluster.local
          nslookup nginx-deployment-2.nginx-headless.dev.svc.cluster.local
  restartPolicy: Never
