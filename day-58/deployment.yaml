apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-apache
  namespace: demo
  labels:
    app: php-apache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: php-apache
  template:
    metadata:
      labels:
        app: php-apache
    spec:
      containers:
        - name: php-apache
          image: registry.k8s.io/hpa-example
          resources:
            requests:
              cpu: "200m"

