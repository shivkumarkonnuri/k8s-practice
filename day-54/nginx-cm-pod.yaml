apiVersion: v1
kind: Pod
metadata:
  name: nginx-cm-pod
spec:
  containers:
    - name: nginx-cm-cont
      image: "nginx:latest"
      volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf        
  volumes:
    - name: nginx-config-volume
      configMap:
        name: nginx-config  
