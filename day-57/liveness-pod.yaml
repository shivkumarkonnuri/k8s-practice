apiVersion: v1
kind: Pod
metadata:
  name: liveness-pod
spec:
  containers:
    - name: "busybox"
      image: "busybox:latest"
      command:
        - sh
        - -c
        - |
          touch /tmp/healthy;
          echo "Container Started";
          sleep 30;
          rm -rf /tmp/healthy;
          echo "File deleted";
          sleep 600;
      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
